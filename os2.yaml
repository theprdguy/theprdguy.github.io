# os2.yaml — Agentic Coding OS v3.0 Configuration
# Server + Dispatcher configuration (replaces linker.yaml)

project_root: "."
devos_dir: "devos"
queue_file: "devos/tasks/QUEUE.yaml"
plans_dir: "devos/plans"
logs_dir: "devos/logs"

# Telegram Bot Configuration
telegram:
  # Set via environment variable: OS2_TG_TOKEN
  token_env: "OS2_TG_TOKEN"
  # Your Telegram user ID (for security — only accept messages from this ID)
  # Set via environment variable: OS2_TG_ALLOWED_USER
  allowed_user_env: "OS2_TG_ALLOWED_USER"

# Agent Dispatch Configuration
agents:
  CLAUDE1:
    mode: pipe               # claude -p (planning + research tasks)
    command: ["claude", "-p"]
    config_dir: ".claude"    # Account A
    timeout: 300
    notes: "Used by os2-server for remote TG-triggered planning. Local CLI handles direct sessions."

  CLAUDE2:
    mode: subprocess         # claude -p with Account B config
    command: ["claude", "-p"]
    config_dir: ".claude-b"  # Account B — different ANTHROPIC_API_KEY
    env:
      CLAUDE_CONFIG_DIR: ".claude-b"
    timeout: 600
    fallback: "CODEX"        # If .claude-b not configured, delegate to CODEX
    notes: "Backend builder. Separate Claude account."

  CODEX:
    mode: subprocess
    command: ["codex", "exec", "-s", "workspace-write", "--add-dir", ".."]
    timeout: 900             # Expanded role = more time
    notes: "Infra + Data builder. Highest token budget."

  GEMINI:
    mode: tmux
    timeout: 600
    tmux:
      session: "os2"
      pane: "gemini"
      start_command: "gemini --yolo"
      ready_pattern: "Type your message"
      ready_timeout: 30.0
      completion_patterns:
        - "^Done:"
        - "^Block:"
        - "^Next:"
      poll_interval: 2.0
    notes: "UI design + publishing. Reduced scope."

# Dispatch settings
dispatch:
  max_concurrent: 2          # Max agents running simultaneously
  auto_chain: true           # Auto-dispatch next ticket when current finishes
  scope_check: true          # Verify no file scope overlap before parallel dispatch
  approval_required: true    # Always require approval before dispatch

# Notification settings
notifications:
  telegram: true             # Send TG notifications on ticket completion/error
  sound: true                # macOS sound on completion

# Server settings
server:
  host: "0.0.0.0"
  port: 8080
  log_level: "INFO"
