- id: T-PF-02
  owner: GEMINI
  status: blocked
  priority: high
  goal: Header, Footer, GrainOverlay, ScrollReveal 컴포넌트를 구현하고 layout.tsx에 통합한다.
  context: '## 컴포넌트 설명


    ### Header.tsx

    - 좌측: 이름 (홈 링크 /)

    - 우측: "About" 링크 (/about), "Contact" (mailto 또는 외부 링크)

    - arzoumanian.fr 참조: 최소한의 네비게이션, 고정 상단 또는 sticky

    - 스타일: 크림 배경 위, 가는 하단 border (rgba(0,0,0,0.08))


    ### Footer.tsx

    - 미니멀: 이름 또는 연도 + GitHub/LinkedIn 등 링크

    - 본문 하단, 상단 border


    ### GrainOverlay.tsx

    - canvas 기반 grain 텍스처 전체 화면 오버레이

    - arzoumanian.fr 참조: pointer-events: none, position: fixed, z-index 높음

    - useEffect로 canvas 초기화, requestAnimationFrame으로 grain 애니메이션

    - opacity: 0.03~0.05 수준 (subtle)


    ### ScrollReveal.tsx

    - children을 래핑하는 컴포넌트

    - Intersection Observer API (useEffect)

    - 뷰포트 진입 시 opacity 0→1, translateY 20px→0 transition

    - ''use client'' 필요


    ## layout.tsx 통합

    - <GrainOverlay /> — body 전체에 오버레이

    - <Header /> + {children} + <Footer /> 순서


    ## 크림 레이아웃 기본값

    - body: background-color: #F8F6F4, color: #000

    - max-width: 800px 내용 영역, 좌우 자동 마진

    - 상하 패딩: 충분히 (px-6 md:px-0 수준)

    '
  constraints:
  - GrainOverlay, ScrollReveal은 'use client'
  - Header, Footer는 서버 컴포넌트 가능
  - canvas grain은 성능 고려 (throttle or low fps ok)
  dod:
  - Header, Footer, GrainOverlay, ScrollReveal 컴포넌트 존재
  - layout.tsx에 모든 컴포넌트 통합
  - npm run dev 후 grain overlay 시각적으로 확인 가능
  - Header 네비게이션 링크 작동
  files:
  - apps/web/src/components/Header.tsx
  - apps/web/src/components/Footer.tsx
  - apps/web/src/components/GrainOverlay.tsx
  - apps/web/src/components/ScrollReveal.tsx
  - apps/web/src/app/layout.tsx
  verify: cd apps/web && npm run build && echo "BUILD OK"
  deps:
  - T-PF-01
  contract_impact: none
  plan_id: portfolio
