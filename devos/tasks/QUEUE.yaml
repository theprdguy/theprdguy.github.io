- id: T-PF-05
  owner: GEMINI
  status: blocked
  priority: medium
  goal: SEO 파일 (robots.ts, sitemap.ts) + GitHub Actions 배포 워크플로우 작성
  context: "## robots.ts\n```typescript\n// apps/web/src/app/robots.ts\nexport const\
    \ dynamic = \"force-static\";\nexport default function robots() {\n  return {\n\
    \    rules: { userAgent: '*', allow: '/' },\n    sitemap: 'https://{username}.github.io/portfolio/sitemap.xml',\n\
    \  };\n}\n```\n⚠️ {username}은 실제 GitHub username으로 교체 필요 (placeholder로 남겨도 됨)\n\
    \n## sitemap.ts\n```typescript\n// apps/web/src/app/sitemap.ts\nexport const dynamic\
    \ = \"force-static\";\nimport { projects } from '@/data/projects';\nconst base\
    \ = 'https://{username}.github.io/portfolio';\nexport default function sitemap()\
    \ {\n  return [\n    { url: base, lastModified: new Date() },\n    { url: `${base}/about`,\
    \ lastModified: new Date() },\n    ...projects.map(p => ({ url: `${base}/projects/${p.slug}`,\
    \ lastModified: new Date() })),\n  ];\n}\n```\n\n## GitHub Actions 워크플로우\n파일:\
    \ .github/workflows/deploy.yml (레포 루트 기준)\n\n```yaml\nname: Deploy Portfolio to\
    \ GitHub Pages\non:\n  push:\n    branches: [main]\n    paths: ['apps/web/**']\n\
    permissions:\n  contents: write\njobs:\n  deploy:\n    runs-on: ubuntu-latest\n\
    \    steps:\n      - uses: actions/checkout@v4\n      - uses: actions/setup-node@v4\n\
    \        with:\n          node-version: '20'\n          cache: 'npm'\n       \
    \   cache-dependency-path: apps/web/package-lock.json\n      - run: cd apps/web\
    \ && npm ci\n      - run: cd apps/web && npm run build\n      - uses: peaceiris/actions-gh-pages@v4\n\
    \        with:\n          github_token: ${{ secrets.GITHUB_TOKEN }}\n        \
    \  publish_dir: apps/web/out\n```\n\n## basePath 확인\nnext.config.ts의 basePath:\
    \ '/portfolio' 가 실제 레포 이름과 일치해야 함.\n레포 이름이 다를 경우 수정 필요.\n"
  constraints:
  - 'robots.ts, sitemap.ts: export const dynamic = "force-static" 필수'
  - GitHub Actions는 레포 루트의 .github/workflows/ 에 위치
  - apps/web/out/ → gh-pages 브랜치로 배포
  dod:
  - apps/web/src/app/robots.ts 존재, force-static 포함
  - apps/web/src/app/sitemap.ts 존재, 6개 URL (/, /about, /projects/deck~mining)
  - .github/workflows/deploy.yml 존재
  - npm run build → out/ 디렉토리에 정적 파일 생성 확인
  files:
  - apps/web/src/app/robots.ts
  - apps/web/src/app/sitemap.ts
  - .github/workflows/deploy.yml
  verify: cd apps/web && npm run build && ls out/
  deps:
  - T-PF-04
  contract_impact: none
  plan_id: portfolio
- id: T-001
  owner: CLAUDE2
  status: doing
  priority: high
  goal: 'os2 최초 설정을 자동화하는 scripts/setup.sh 스크립트와 make setup Makefile 타겟을 구현한다.

    make setup 한 줄로 아래 4단계를 순차 실행하며, 이미 설정된 항목은 스킵한다.

    '
  context: "현재 os2 최초 설정은 START_HERE.md를 보고 수동으로 진행해야 한다.\n자동화 스크립트가 없어 새 컴퓨터(서브 컴\
    \ 등)에서 설정 시 누락 발생 위험이 있다.\n\n## 동작 흐름 (순서대로)\n\n1. CLI 도구 확인\n   - 필수 (없으면 에러\
    \ 후 exit): python3, pip3, git\n   - 선택 (없으면 경고만): claude, codex, gemini, tmux\n\
    \   - 각 도구의 설치 안내 URL 포함\n\n2. Python 의존성 설치\n   - pip3 install -r requirements.txt\
    \ -q\n\n3. 환경변수 설정 (비파괴적 — 이미 있으면 스킵)\n   - OS2_TG_TOKEN: 환경에 없으면 read -rp 로 입력\
    \ 받음\n   - OS2_TG_ALLOWED_USER: 환경에 없으면 read -rp 로 입력 받음 (선택)\n   - 입력받은 값은 프로젝트\
    \ 루트 .env 파일에 저장 (이미 키가 있으면 추가 안 함)\n   - ~/.zshrc 영구 등록 여부도 y/N 으로 물어봄 (중복 방지\
    \ 로직 포함)\n   - .env 로드: 스크립트 시작 시 .env 존재하면 set -a; source .env; set +a\n\n4.\
    \ Claude 2 (Account B) 인증 확인\n   - .claude-b/.credentials.json 존재 여부 확인\n   -\
    \ 없으면 경고 + \"CLAUDE_CONFIG_DIR=.claude-b claude login\" 안내\n\n## 출력 형식\n- 색상 출력:\
    \ ✅ (green), ⚠️ (yellow), ❌ (red)\n- 섹션 헤더: \"1/4 CLI 도구 확인\" 형식\n- 최종 요약: 경고\
    \ 수에 따라 완료/주의 메시지\n\n## Makefile 변경\n- scripts/setup.sh 를 실행하는 setup 타겟 추가\n-\
    \ .PHONY 리스트에 setup 추가\n- help 타겟 Setup 섹션에 make setup 항목 추가\n\n## 환경변수 참고\n-\
    \ server/config.py: get_telegram_token() — OS2_TG_TOKEN 읽음\n- server/config.py:\
    \ get_allowed_user() — OS2_TG_ALLOWED_USER 읽음\n- .gitignore: .env 이미 gitignore\
    \ 처리됨\n"
  constraints:
  - bash (#!/usr/bin/env bash), macOS zsh 환경 호환
  - set -e 사용하되 선택 항목 입력 스킵은 에러 처리 주의
  - 토큰 값을 터미널에 echo 하지 말 것 (보안)
  - 비파괴적: 이미 설정된 값은 절대 덮어쓰지 않음
