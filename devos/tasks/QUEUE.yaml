tickets:
- id: T-001
  owner: CLAUDE2
  status: doing
  priority: high
  goal: 'os2 최초 설정을 자동화하는 scripts/setup.sh 스크립트와 make setup Makefile 타겟을 구현한다.

    make setup 한 줄로 아래 4단계를 순차 실행하며, 이미 설정된 항목은 스킵한다.

    '
  context: "현재 os2 최초 설정은 START_HERE.md를 보고 수동으로 진행해야 한다.\n자동화 스크립트가 없어 새 컴퓨터(서브 컴\
    \ 등)에서 설정 시 누락 발생 위험이 있다.\n\n## 동작 흐름 (순서대로)\n\n1. CLI 도구 확인\n   - 필수 (없으면 에러\
    \ 후 exit): python3, pip3, git\n   - 선택 (없으면 경고만): claude, codex, gemini, tmux\n\
    \   - 각 도구의 설치 안내 URL 포함\n\n2. Python 의존성 설치\n   - pip3 install -r requirements.txt\
    \ -q\n\n3. 환경변수 설정 (비파괴적 — 이미 있으면 스킵)\n   - OS2_TG_TOKEN: 환경에 없으면 read -rp 로 입력\
    \ 받음\n   - OS2_TG_ALLOWED_USER: 환경에 없으면 read -rp 로 입력 받음 (선택)\n   - 입력받은 값은 프로젝트\
    \ 루트 .env 파일에 저장 (이미 키가 있으면 추가 안 함)\n   - ~/.zshrc 영구 등록 여부도 y/N 으로 물어봄 (중복 방지\
    \ 로직 포함)\n   - .env 로드: 스크립트 시작 시 .env 존재하면 set -a; source .env; set +a\n\n4.\
    \ Claude 2 (Account B) 인증 확인\n   - .claude-b/.credentials.json 존재 여부 확인\n   -\
    \ 없으면 경고 + \"CLAUDE_CONFIG_DIR=.claude-b claude login\" 안내\n\n## 출력 형식\n- 색상 출력:\
    \ ✅ (green), ⚠️ (yellow), ❌ (red)\n- 섹션 헤더: \"1/4 CLI 도구 확인\" 형식\n- 최종 요약: 경고\
    \ 수에 따라 완료/주의 메시지\n\n## Makefile 변경\n- scripts/setup.sh 를 실행하는 setup 타겟 추가\n-\
    \ .PHONY 리스트에 setup 추가\n- help 타겟 Setup 섹션에 make setup 항목 추가\n\n## 환경변수 참고\n-\
    \ server/config.py: get_telegram_token() — OS2_TG_TOKEN 읽음\n- server/config.py:\
    \ get_allowed_user() — OS2_TG_ALLOWED_USER 읽음\n- .gitignore: .env 이미 gitignore\
    \ 처리됨\n"
  constraints:
  - bash (#!/usr/bin/env bash), macOS zsh 환경 호환
  - set -e 사용하되 선택 항목 입력 스킵은 에러 처리 주의
  - 토큰 값을 터미널에 echo 하지 말 것 (보안)
  - 비파괴적: 이미 설정된 값은 절대 덮어쓰지 않음
  dod:
  - make setup 실행 시 4단계가 순서대로 출력됨
  - 모든 도구 설치 + 토큰 설정 완료 환경에서 경고 없이 완료됨
  - OS2_TG_TOKEN 이 이미 설정된 환경에서 실행 시 입력 프롬프트 없이 스킵됨
  - .env 에 토큰이 저장되고 make start 로 서버가 정상 시작됨
  - zshrc 등록 거부 시 .env 만 저장되고 zshrc 는 변경되지 않음
  files:
  - scripts/setup.sh
  - Makefile
  verify: bash scripts/setup.sh
  deps: []
  contract_impact: none
  plan_id: null
