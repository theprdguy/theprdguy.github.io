  context: "## hub/__main__.py (~40줄)\n참조: os2/server/__main__.py — 와이어링 패턴 동일\n\n\
    흐름:\n1. hub.yaml 로드 (없으면 오류 후 exit)\n2. OS2_TG_TOKEN 읽기 (없으면 오류 + 안내 후 exit)\n\
    3. allowed_user 읽기 (없으면 경고)\n4. Executor() 생성\n5. HubBot(token, allowed_user,\
