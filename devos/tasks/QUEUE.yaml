- id: T-HUB-06
  owner: CODEX
  status: done
  priority: medium
  goal: hub.yaml의 프로젝트 경로를 상대경로로 지원하고, config.py에서 hub.yaml 위치 기준으로 resolve되도록 수정한다.
  context: "## 배경\n현재 hub.yaml의 path 값이 절대경로로 하드코딩되어 있어 다른 컴퓨터에서는 경로 수정이 필요하다.\nos2-hub/는\
    \ 항상 os2/, deck/ 등 프로젝트들의 형제 디렉토리이므로, 상대경로(../os2 등)를 사용하면 어느 컴퓨터에서도 동작한다.\n\n\
    ## 변경 사항\n\n### 1. hub.yaml 수정\n```yaml\ndefault_project: deck\nprojects_root:\
    \ ..  # hub 부모 디렉토리\n\nprojects:\n  os2:\n    path: ../os2\n  deck:\n    path:\
    \ ../deck\n```\n\n### 2. hub/config.py의 get_projects() 수정\n현재: Path(project[\"\
    path\"]).expanduser()\n변경: hub.yaml 파일이 있는 디렉토리(hub_dir)를 기준으로 resolve\n\n```python\n\
    def get_projects(config: dict, config_path: str = \"hub.yaml\") -> dict:\n   \
    \ hub_dir = Path(config_path).resolve().parent\n    projects = {}\n    for name,\
    \ project in config.get(\"projects\", {}).items():\n        raw = Path(project[\"\
    path\"]).expanduser()\n        if not raw.is_absolute():\n            raw = hub_dir\
    \ / raw\n        projects[name] = {\n            \"path\": raw.resolve(),\n  \
    \          \"description\": project.get(\"description\", \"\"),\n        }\n \
    \   return projects\n```\n\nload_hub_config()의 경로 검증도 동일하게 hub_dir 기준으로 수정.\n\n\
    ### 3. hub/__main__.py 수정\nget_projects() 호출 시 config_path 인자 전달.\n"
  constraints:
