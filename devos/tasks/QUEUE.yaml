- id: T-HUB-02
  owner: CODEX
  status: done
  priority: high
  goal: hub/config.py와 hub/executor.py를 구현한다.
  context: "## hub/config.py (~40줄)\nhub.yaml을 로드하고 프로젝트 경로를 검증하는 모듈.\n\n```python\n\
    def load_hub_config(config_path: str = \"hub.yaml\") -> dict:\n    \"\"\"hub.yaml\
    \ 로드. projects의 path 존재 여부 검증.\"\"\"\n\ndef get_projects(config: dict) -> dict:\n\
    \    \"\"\"name → {path: Path, description: str} 딕셔너리 반환.\"\"\"\n\ndef get_telegram_token(config:\
    \ dict) -> str:\n    \"\"\"OS2_TG_TOKEN 환경변수 읽기. 없으면 ValueError.\"\"\"\n\ndef\
    \ get_allowed_user(config: dict) -> int | None:\n    \"\"\"OS2_TG_ALLOWED_USER\
    \ 환경변수 읽기.\"\"\"\n```\n\n## hub/executor.py (~60줄)\nasyncio subprocess 기반 터미널\
    \ 명령 실행 엔진.\n\n중요: claude -p는 stdin이 아닌 인자로 프롬프트를 받음.\n참조: os2/server/planner.py:121\
    \ → subprocess.run([\"claude\", \"-p\", full_prompt], cwd=project_root)\n\n```python\n\
    class Executor:\n    async def run(self, cmd: str, cwd: Path, timeout: int = 120)\
    \ -> tuple[int, str, str]:\n        \"\"\"shell 명령 asyncio subprocess로 실행. (returncode,\
    \ stdout, stderr) 반환.\"\"\"\n\n    async def invoke_claude1(self, prompt: str,\
    \ project_path: Path, timeout: int = 300) -> str:\n        \"\"\"\n        프로젝트\
    \ 디렉토리에서 claude -p 실행.\n        해당 프로젝트의 .claude/CLAUDE.md가 자동 적용됨.\n        cmd:\
    \ f\"claude -p {shlex.quote(prompt)}\"\n        cwd: project_path\n        \"\"\
    \"\n\n    async def read_file(self, filepath: Path, max_chars: int = 3000) ->\
    \ str:\n        \"\"\"파일 읽기. 없으면 'File not found: {path}' 반환.\"\"\"\n\n    async\
    \ def clone_project(self, url: str, dest: Path) -> tuple[bool, str]:\n       \
    \ \"\"\"git clone url dest. (success, message) 반환.\"\"\"\n```\n"
  constraints:
  - asyncio 기반 (python-telegram-bot v21+이 asyncio 사용)
  - shlex.quote로 프롬프트 이스케이프
  - timeout 초과 시 TimeoutError가 아닌 메시지 문자열 반환
  dod:
  - hub/config.py 존재, load_hub_config() 작동
  - hub/executor.py 존재, Executor 클래스 작동
  - python3 -c "from hub.config import load_hub_config; print(load_hub_config())"
    오류 없음
  files:
  - /Users/hoanshin/Desktop/thePRD/os2-hub/hub/config.py
  - /Users/hoanshin/Desktop/thePRD/os2-hub/hub/executor.py
  verify: cd /Users/hoanshin/Desktop/thePRD/os2-hub && python3 -c "from hub.config
    import load_hub_config; load_hub_config()"
  deps:
  - T-HUB-01
  contract_impact: none
  plan_id: os2-hub
- id: T-HUB-03
  owner: CODEX
  status: done
  priority: high
  goal: hub/bot.py에 HubBot 클래스를 구현한다. TG 명령어 핸들러 전체 포함.
  context: '## 구조

    OS2Bot(os2/server/telegram.py)을 참조하되 routing 레이어 추가.

    python-telegram-bot v21+ 사용.


    ## 상태

    - self.active_project: str — 활성 프로젝트명 (기본: hub.yaml의 default_project)

    - self.projects: dict — name → {path: Path, description: str}

    - self.executor: Executor


    ## 명령어 목록


    ### hub 내부 처리 (subprocess 없음)

    - /start — 도움말 (hub 명령어 전체 목록)

    - /projects — 등록된 프로젝트 목록 + 활성 표시 (★)

    - /switch <name> — 활성 프로젝트 전환


    ### 파일 읽기 (executor.read_file)

    - /status — devos/PROJECT_STATE.md 내용

    - /queue — devos/tasks/QUEUE.yaml 내용

    - /logs — devos/logs/ 최근 5개 파일명 목록


    ### make 명령 실행 (executor.run)

    - /start-server — make start (cwd=active project)

    - /stop-server — make stop (cwd=active project)

    - /server-status — make ps (cwd=active project)

    - /dispatch T-XXX — make dispatch T=T-XXX (cwd=active project)

    - /approve — make approve (cwd=active project) — 없으면 fallback: pending/ 디렉토리의
    첫 파일을 approved/로 이동


    ### Claude 1 호출 (executor.invoke_claude1)

    - /prd <text> — "Decompose this PRD: {text}"

    - /ask <question> — question 그대로 전달

    - 자유 텍스트 — 텍스트 그대로 전달


    ### git 명령 (executor.clone_project)

    - /clone <url> [name] — git clone 후 hub.yaml에 프로젝트 추가, active로 전환


    ## 응답 형식

    - 모든 응답에 [project_name] 프리픽스

    - Claude 1 응답은 3000자 truncate

    - make 명령 결과: returncode != 0이면 stderr 포함한 오류 메시지

    - ParseMode.MARKDOWN 사용


    ## 참조 파일

    os2/server/telegram.py — OS2Bot 구조 (auth, _reply, build_app, run 패턴)

    '
  constraints:
  - /start-server 명령은 /start 명령과 충돌하지 않게 CommandHandler 등록 순서 주의
  - /clone 후 hub.yaml 파일을 실제로 업데이트 (yaml.dump)
  - send_notification() 메서드 포함 (dispatcher 콜백용, 이번에는 쓰이지 않지만 인터페이스 준비)
  dod:
  - hub/bot.py 존재
  - HubBot 클래스에 위 명령어 핸들러 모두 구현
  - /switch 후 /status 호출 시 전환된 프로젝트 경로의 파일 반환
  files:
  - /Users/hoanshin/Desktop/thePRD/os2-hub/hub/bot.py
  verify: cd /Users/hoanshin/Desktop/thePRD/os2-hub && python3 -c "from hub.bot import
    HubBot; print('ok')"
  deps:
  - T-HUB-02
  contract_impact: none
  plan_id: os2-hub
