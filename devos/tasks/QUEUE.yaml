  context: '## 변경 사항


    ### 1. /server-status → /status-server 변경

    - bot.py에서 cmd_server_status �핸들러의 MessageHandler regex 패턴 변경

    - `r"^/server-status(?:\s|$|@)"` → `r"^/status-server(?:\s|$|@)"`

    - /start 명령어에도 도움말 텍스트 업데이트


    ### 2. /setup-server 명령 추가

    - cmd_setup_server 핸들러 추가: `await self._run_make("setup")`

    - MessageHandler regex: `r"^/setup-server(?:\s|$|@)"`

    - /start 도움말에 추가


    ## 최종 서버 관리 명령어 목록

    - /setup-server → make setup

    - /start-server → make start

    - /stop-server → make stop

    - /status-server → make ps

    '
