# Agent Registry (v3.0 — os2)
# Central registry of all 4 agents in the multi-LLM OS.
# Read by Claude 1 (Planner) at boot to understand the team.

version: "3.0"

agents:
  - id: claude1-planner
    role: planner-researcher
    description: "Planner, Researcher, SSOT Manager. Plans, creates tickets, triages questions, reviews PRs. Never codes."
    instruction_file: .claude/CLAUDE.md
    capabilities: [planning, research, triage, ticket-creation, review, ssot-management]
    can_modify:
      - "devos/**"
      - ".claude/**"
      - ".claude-b/**"
      - "AGENTS.md"
      - "GEMINI.md"
      - "os2.yaml"
      - "Makefile"
    cannot_modify:
      - "apps/**"
      - "packages/**"
      - "infra/**"
      - "scripts/**"
      - "tests/**"
    mode: "interactive | pipe"  # local CLI or remote via os2-server
    account: A
    status: active
    notes: "Dual mode: interactive Claude Code CLI (local) or claude -p pipe mode (via TG server). Uses MCP/context7 for research."

  - id: claude2-backend
    role: backend-builder
    description: "Backend builder. Implements API endpoints, service logic, DB models."
    instruction_file: .claude-b/CLAUDE.md
    capabilities: [backend, api, service-logic, database]
    can_modify:
      - "apps/api/**"
      - "packages/shared/**"
      - "tests/api/**"
      - "devos/logs/*-claude2-*"
      - "devos/questions/QUEUE.md"
    cannot_modify:
      - "apps/web/**"
      - "styles/**"
      - "devos/tasks/QUEUE.yaml"
      - "devos/PROJECT_STATE.md"
    mode: "pipe"  # claude -p with account B config
    account: B
    config_dir: ".claude-b"
    status: active
    notes: "Uses separate Claude Code config dir (.claude-b) for Account B credentials."

  - id: codex-infra
    role: infra-data-builder
    description: "Infra + Data builder (expanded role). Handles infrastructure, data pipelines, CI/CD, scripts, utility functions, test scaffolding."
    instruction_file: AGENTS.md
    capabilities: [infra, data, ci-cd, scripts, testing, refactoring, utilities]
    can_modify:
      - "apps/api/**"  # shared scope with claude2, separated by ticket files
      - "packages/**"
      - "infra/**"
      - "scripts/**"
      - "tests/**"
      - "devos/docs/API_CONTRACT.md"
      - "devos/logs/*-codex-*"
      - "devos/questions/QUEUE.md"
    cannot_modify:
      - "apps/web/**"
      - "styles/**"
      - "devos/tasks/QUEUE.yaml"
      - "devos/PROJECT_STATE.md"
    mode: "subprocess"
    token_budget: high  # Most tokens available — assign complex/large tickets here
    status: active
    notes: "Expanded role vs v2.0. Reads AGENTS.md natively. High token budget — prefer for large or complex tasks."

  - id: gemini-ui
    role: ui-publisher
    description: "UI design + publishing only. Implements visual components, styling, and UX. No business logic."
    instruction_file: GEMINI.md
    capabilities: [ui-design, styling, publishing, ux]
    can_modify:
      - "apps/web/**"
      - "styles/**"
      - "devos/docs/UI_CONTRACT.md"
      - "devos/logs/*-gemini-*"
      - "devos/questions/QUEUE.md"
    cannot_modify:
      - "apps/api/**"
      - "packages/**"
      - "infra/**"
      - "devos/tasks/QUEUE.yaml"
      - "devos/PROJECT_STATE.md"
    mode: "tmux"
    scope: "design-only"  # reduced scope vs v2.0 — no business logic
    status: active
    notes: "Reduced scope vs v2.0. Reads GEMINI.md natively. UI design and publishing only."
